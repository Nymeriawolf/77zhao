                name: "护城河",
                discipline: "经济学",
                coreConcept: "企业的竞争优势能够抵御竞争对手的攻击。护城河包括品牌、网络效应、成本优势、转换成本、牌照等。",
                description: "巴菲特强调投资有护城河的企业。护城河的宽窄决定了超额利润能持续多久。",
                example: "可口可乐的品牌护城河；微信的网络效应护城河；航空公司的规模护城河。",
                application: "在投资分析中评估护城河的宽窄和持久性；在企业经营中构建和维护护城河。",
                keywords: ["竞争", "优势", "保护", "企业", "品牌", "壁垒", "投资", "防御", "持续"],
                relatedModels: [94, 95]
            },
            {
                id: 100,
                name: "Lollapalooza效应",
                discipline: "经济学",
                coreConcept: "芒格原创概念：多种力量叠加产生巨大的协同效应。整体大于部分之和。",
                description: "当多个因素同向作用时，效果不是简单相加而是相乘放大。好公司+好行业+好管理+好时机=巨大成功。",
                example: "可口可乐同时拥有品牌护城河、规模优势、分销网络、文化影响力，这些因素相互强化。",
                application: "在寻找机会时，寻找多种有利因素汇聚的节点；在风险分析时，警惕多种负面因素的叠加。",
                keywords: ["协同", "叠加", "放大", "组合", "综合", "效应", "力量", "整体", "复合"],
                relatedModels: [93, 99]
            }
        ];

        // 十大学科列表
        const disciplines = ['历史学', '心理学', '生理学', '数学', '工程学', '生物学', '物理学', '化学', '统计学', '经济学'];

        // 分析用户输入并匹配相关模型
        function analyzeInput() {
            const input = document.getElementById('userInput').value.trim();
            if (!input) {
                alert('请输入你想分析的事情');
                return;
            }

            // 显示加载状态
            document.getElementById('btnText').classList.add('hidden');
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('analyzeBtn').disabled = true;

            // 模拟分析延迟
            setTimeout(() => {
                const result = matchModels(input);
                displayResults(input, result);
                
                // 恢复按钮状态
                document.getElementById('btnText').classList.remove('hidden');
                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('analyzeBtn').disabled = false;
            }, 1000);
        }

        // 匹配模型 - 按10大学科维度 + 相关性排序
        function matchModels(input) {
            const inputLower = input.toLowerCase();
            const modelScores = [];

            // 对每个模型计算相关性分数
            models.forEach(model => {
                let score = 0;
                let matchReasons = [];

                // 关键词匹配
                model.keywords.forEach(keyword => {
                    if (inputLower.includes(keyword)) {
                        score += 10;
                        matchReasons.push(`关键词匹配: "${keyword}"`);
                    }
                });

                // 语义扩展匹配
                const semanticMatches = getSemanticMatches(inputLower, model);
                if (semanticMatches.score > 0) {
                    score += semanticMatches.score;
                    matchReasons.push(...semanticMatches.reasons);
                }

                modelScores.push({
                    model,
                    score,
                    matchReasons
                });
            });

            // 按分数排序
            modelScores.sort((a, b) => b.score - a.score);

            // 分配权重（基于相对分数）
            const maxScore = modelScores[0].score || 1;
            modelScores.forEach(item => {
                item.weight = Math.max(5, Math.round((item.score / maxScore) * 100));
            });

            // 筛选模型：
            // 1. 从每个学科至少取一个最相关的模型
            // 2. 再取额外相关的模型
            const selectedModels = [];
            const disciplineAdded = new Set();

            // 首先从每个学科取最相关的模型
            disciplines.forEach(discipline => {
                const disciplineModels = modelScores.filter(m => m.model.discipline === discipline);
                if (disciplineModels.length > 0 && disciplineModels[0].score > 0) {
                    selectedModels.push(disciplineModels[0]);
                    disciplineAdded.add(discipline);
                }
            });

            // 再添加额外的相关模型（按分数）
            modelScores.forEach(item => {
                if (!selectedModels.find(m => m.model.id === item.model.id) && item.score > 0 && selectedModels.length < 15) {
                    selectedModels.push(item);
                }
            });

            // 按权重重新排序
            selectedModels.sort((a, b) => b.weight - a.weight);

            return selectedModels;
        }

        // 语义匹配扩展
        function getSemanticMatches(input, model) {
            let score = 0;
            let reasons = [];

            // 语义映射表
            const semanticMap = {
                '工作': ['决策', '能力', '团队', '管理', '效率', '习惯', '压力', '竞争'],
                '钱': ['投资', '收益', '成本', '财富', '价格', '交易', '风险', '选择'],
                '关系': ['社交', '人际', '沟通', '合作', '信任', '群体', '团队', '认同'],
                '学习': ['成长', '知识', '能力', '进步', '认知', '理解', '积累', '习惯'],
                '改变': ['变化', '调整', '适应', '转型', '决策', '选择', '习惯', '路径'],
                '未来': ['预测', '计划', '目标', '长期', '规划', '预期', '趋势'],
                '成功': ['目标', '竞争', '优势', '效率', '增长', '策略', '积累'],
                '失败': ['风险', '错误', '损失', '后果', '挑战', '挫折', '概率'],
                '创业': ['企业', '市场', '竞争', '增长', '产品', '客户', '投资', '创新', '规模'],
                '投资': ['风险', '收益', '决策', '机会', '价值', '资产', '选择', '概率', '成本'],
                '团队': ['群体', '合作', '管理', '组织', '协同', '沟通', '激励'],
                '产品': ['市场', '客户', '需求', '竞争', '价值', '销售', '质量'],
                '时间': ['长期', '规划', '决策', '机会', '效率', '资源', '习惯', '复利'],
                '问题': ['解决', '方法', '分析', '决策', '思考', '策略', '原因'],
                '选择': ['决策', '机会', '比较', '风险', '后果', '评估', '成本'],
                '健康': ['压力', '睡眠', '习惯', '精力', '平衡', '身体', '恢复'],
                '焦虑': ['压力', '风险', '不确定性', '预测', '恐惧', '情绪', '概率']
            };

            Object.keys(semanticMap).forEach(key => {
                if (input.includes(key)) {
                    semanticMap[key].forEach(relatedWord => {
                        if (model.keywords.includes(relatedWord)) {
                            score += 3;
                            reasons.push(`语义关联: "${key}"→"${relatedWord}"`);
                        }
                    });
                }
            });

            return { score, reasons };
        }

        // 显示结果
        function displayResults(input, matchedModels) {
            const resultsSection = document.getElementById('resultsSection');
            const summaryStats = document.getElementById('summaryStats');
            const modelCardsContainer = document.getElementById('modelCardsContainer');
            const analysisContent = document.getElementById('analysisContent');

            resultsSection.classList.remove('hidden');

            // 显示统计摘要
            const disciplinesUsed = [...new Set(matchedModels.map(m => m.model.discipline))];
            const avgWeight = Math.round(matchedModels.reduce((sum, m) => sum + m.weight, 0) / matchedModels.length);
            
            summaryStats.innerHTML = `
                <div class="bg-slate-800/30 rounded-xl p-4 text-center border border-indigo-900/20 fade-in">
                    <div class="text-2xl font-bold text-indigo-400">${matchedModels.length}</div>
                    <div class="text-gray-400 text-sm">推荐模型</div>
                </div>
                <div class="bg-slate-800/30 rounded-xl p-4 text-center border border-indigo-900/20 fade-in">
                    <div class="text-2xl font-bold text-purple-400">${disciplinesUsed.length}</div>
                    <div class="text-gray-400 text-sm">学科维度</div>
                </div>
                <div class="bg-slate-800/30 rounded-xl p-4 text-center border border-indigo-900/20 fade-in">
                    <div class="text-2xl font-bold text-pink-400">${avgWeight}%</div>
                    <div class="text-gray-400 text-sm">平均相关度</div>
                </div>
                <div class="bg-slate-800/30 rounded-xl p-4 text-center border border-indigo-900/20 fade-in">
                    <div class="text-2xl font-bold text-cyan-400">多元</div>
                    <div class="text-gray-400 text-sm">综合视角</div>
                </div>
            `;

            // 按学科分组显示模型
            const groupedByDiscipline = {};
            matchedModels.forEach(item => {
                const d = item.model.discipline;
                if (!groupedByDiscipline[d]) {
                    groupedByDiscipline[d] = [];
                }
                groupedByDiscipline[d].push(item);
            });

            modelCardsContainer.innerHTML = '';
            
            let delay = 0;
            Object.keys(groupedByDiscipline).forEach(discipline => {
                const color = disciplineColors[discipline];
                const disciplineGroup = document.createElement('div');
                disciplineGroup.className = 'fade-in';
                disciplineGroup.style.animationDelay = `${delay * 0.1}s`;
                delay++;

                const modelsHtml = groupedByDiscipline[discipline].map(item => {
                    const m = item.model;
                    const w = item.weight;
                    return `
                        <div class="model-card bg-slate-800/50 rounded-xl p-4 border border-indigo-900/30 cursor-pointer" onclick="showModelDetail(${m.id})">
                            <div class="flex items-center justify-between mb-2">
                                <span class="font-semibold text-white">${m.name}</span>
                                <span class="text-sm font-bold ${color.text}">${w}%</span>
                            </div>
                            <div class="w-full bg-slate-700 rounded-full h-2 mb-3">
                                <div class="weight-bar bg-gradient-to-r ${color.gradient} h-2 rounded-full" style="width: ${w}%"></div>
                            </div>
                            <p class="text-gray-400 text-sm line-clamp-2">${m.coreConcept.substring(0, 50)}...</p>
                        </div>
                    `;
                }).join('');

                disciplineGroup.innerHTML = `
                    <div class="category-header ${color.bg} rounded-xl p-3 mb-4 flex items-center gap-3">
                        <span class="text-lg font-bold ${color.text}">${discipline}</span>
                        <span class="text-sm text-gray-400">${groupedByDiscipline[discipline].length}个模型</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        ${modelsHtml}
                    </div>
                `;

                modelCardsContainer.appendChild(disciplineGroup);
            });

            // 生成综合分析
            const analysis = generateAnalysis(input, matchedModels);
            analysisContent.innerHTML = analysis;

            // 滚动到结果
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        // 生成综合分析
        function generateAnalysis(input, matchedModels) {
            let analysis = '';
            
            analysis += `<p class="text-indigo-300 font-semibold mb-4">针对你的情况，我们从 <span class="text-white">${matchedModels.length}个思维模型</span> 进行了多元分析：</p>`;

            // 按学科分组分析
            const groupedByDiscipline = {};
            matchedModels.forEach(item => {
                const d = item.model.discipline;
                if (!groupedByDiscipline[d]) {
                    groupedByDiscipline[d] = [];
                }
                groupedByDiscipline[d].push(item);
            });

            Object.keys(groupedByDiscipline).forEach(discipline => {
                const color = disciplineColors[discipline];
                const items = groupedByDiscipline[discipline];
                
                analysis += `<div class="mt-4 fade-in">`;
                analysis += `<h4 class="${color.text} font-semibold mb-2 flex items-center gap-2">`;
                analysis += `<span class="w-2 h-2 rounded-full bg-gradient-to-r ${color.gradient}"></span>`;
                analysis += `${discipline}视角`;
                analysis += `</h4>`;
                analysis += `<ul class="space-y-2 ml-4">`;
                
                items.slice(0, 2).forEach(item => {
                    analysis += `<li class="text-gray-300 text-sm">
                        <span class="${color.text} font-medium">【${item.model.name}】</span>
                        <span class="text-gray-400">${getApplicationInsight(item.model, input)}</span>
                    </li>`;
                });
                
                analysis += `</ul></div>`;
            });

            // 行动建议
            const topModels = matchedModels.slice(0, 5);
            analysis += `
                <div class="mt-6 p-4 bg-gradient-to-r from-indigo-900/30 to-purple-900/30 rounded-xl border border-indigo-800/50">
                    <p class="text-indigo-300 font-semibold mb-3">📌 综合行动建议</p>
                    <ul class="space-y-2 text-gray-300 text-sm">
            `;
            
            topModels.slice(0, 3).forEach((item, idx) => {
                analysis += `<li class="flex gap-2"><span class="text-indigo-400">${idx + 1}.</span>${getActionSuggestion(item.model)}</li>`;
            });
            
            analysis += `</ul></div>`;

            return analysis;
        }

        // 获取应用洞察
        function getApplicationInsight(model, input) {
            const insights = {
                '确认偏误': '主动寻找反对意见，避免只看支持自己观点的信息',
                '锚定效应': '警惕第一印象对决策的影响，尝试重新评估',
                '机会成本': '考虑选择背后的放弃，评估真正付出的代价',
                '复利效应': '从小事做起，坚持积累，时间会放大效果',
                '第一性原理': '回归问题本质，打破常规思维',
                '二阶思维': '考虑行动的后续影响，不只是直接结果',
                '逆向思维': '想想如何失败，然后避免这些行为',
                '安全边际': '为不确定性预留缓冲空间',
                '能力圈': '确保决策在自己理解的范围内',
                '损失厌恶': '认识到对损失的敏感度是收益的2倍，避免过度保守',
                '帕累托法则': '找到关键的20%，它们贡献80%的结果',
                'Lollapalooza效应': '寻找多种有利因素的汇聚点'
            };
            return insights[model.name] || model.application.substring(0, 60) + '...';
        }

        // 获取行动建议
        function getActionSuggestion(model) {
            const suggestions = {
                '确认偏误': '列出3个反对当前决策的理由，认真评估',
                '锚定效应': '忽略第一印象，从多个来源重新收集信息',
                '机会成本': '写下选择后放弃的其他可能性及其价值',
                '复利效应': '找到可以持续积累的事情，立即开始',
                '第一性原理': '问"这件事最基本的事实是什么？"',
                '二阶思维': '问"然后呢？后果的后果是什么？"',
                '逆向思维': '问"怎样做一定会失败？"然后避免这些行为',
                '安全边际': '在计划中预留20-30%的缓冲空间',
                '能力圈': '确认决策涉及的知识是否在自己的理解范围内',
                '损失厌恶': '客观评估风险和收益，不要被恐惧主导',
                '帕累托法则': '找出最重要的1-2件事，优先投入资源',
                'Lollapalooza效应': '寻找多个有利因素叠加的机会'
            };
            return suggestions[model.name] || `运用${model.name}重新审视当前情况`;
        }

        // 显示模型详情弹窗
        function showModelDetail(modelId) {
            const model = models.find(m => m.id === modelId);
            if (!model) return;

            const color = disciplineColors[model.discipline];
            const modal = document.getElementById('modelModal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <span class="text-sm px-3 py-1 rounded-full ${color.bg} ${color.text}">${model.discipline}</span>
                        <h2 class="text-2xl font-bold text-white">${model.name}</h2>
                    </div>
                    <button onclick="closeModelModal()" class="text-gray-400 hover:text-white transition-colors text-2xl">&times;</button>
                </div>

                <div class="space-y-6">
                    <div>
                        <h3 class="text-indigo-300 font-semibold mb-2">📖 核心概念</h3>
                        <p class="text-gray-300 leading-relaxed">${model.coreConcept}</p>
                    </div>

                    <div>
                        <h3 class="text-indigo-300 font-semibold mb-2">📝 详细说明</h3>
                        <p class="text-gray-300 leading-relaxed">${model.description}</p>
                    </div>

                    <div>
                        <h3 class="text-indigo-300 font-semibold mb-2">💡 实际案例</h3>
                        <div class="bg-slate-900/50 rounded-lg p-4 border border-slate-700">
                            <p class="text-gray-300">${model.example}</p>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-indigo-300 font-semibold mb-2">🎯 应用指南</h3>
                        <div class="bg-gradient-to-r from-indigo-900/30 to-purple-900/30 rounded-lg p-4 border border-indigo-800/50">
                            <p class="text-gray-300">${model.application}</p>
                        </div>
                    </div>

                    ${model.relatedModels && model.relatedModels.length > 0 ? `
                    <div>
                        <h3 class="text-indigo-300 font-semibold mb-2">🔗 相关模型</h3>
                        <div class="flex flex-wrap gap-2">
                            ${model.relatedModels.map(id => {
                                const related = models.find(m => m.id === id);
                                return related ? `<span onclick="showModelDetail(${id})" class="text-sm px-3 py-1 rounded-full bg-slate-700 text-gray-300 cursor-pointer hover:bg-slate-600 transition-colors">${related.name}</span>` : '';
                            }).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // 关闭模型详情弹窗
        function closeModelModal() {
            const modal = document.getElementById('modelModal');
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        // 点击弹窗外部关闭
        document.getElementById('modelModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModelModal();
            }
        });

        // ESC键关闭弹窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModelModal();
            }
        });

        // 显示所有模型
        let allModelsVisible = false;
        function toggleAllModels() {
            const grid = document.getElementById('allModelsGrid');
            const btn = document.getElementById('toggleBtn');
            
            if (allModelsVisible) {
                grid.classList.add('hidden');
                btn.textContent = '展开全部 ▼';
            } else {
                grid.classList.remove('hidden');
                btn.textContent = '收起 ▲';
                
                // 填充所有模型（按学科分组）
                if (grid.children.length === 0) {
                    disciplines.forEach(discipline => {
                        const color = disciplineColors[discipline];
                        const disciplineModels = models.filter(m => m.discipline === discipline);
                        
                        // 添加学科标题
                        const header = document.createElement('div');
                        header.className = `col-span-full ${color.bg} rounded-lg p-2 mt-4 first:mt-0`;
                        header.innerHTML = `<span class="${color.text} font-semibold">${discipline}</span><span class="text-gray-500 text-sm ml-2">(${disciplineModels.length}个模型)</span>`;
                        grid.appendChild(header);
                        
                        // 添加模型
                        disciplineModels.forEach(model => {
                            const tag = document.createElement('div');
                            tag.className = 'bg-slate-800/50 rounded-lg p-3 border border-indigo-900/20 hover:border-indigo-600/50 transition-colors cursor-pointer';
                            tag.innerHTML = `
                                <div class="font-medium text-indigo-300 text-sm">${model.id}. ${model.name}</div>
                                <div class="text-xs text-gray-500 mt-1 line-clamp-2">${model.coreConcept.substring(0, 40)}...</div>
                            `;
                            tag.onclick = () => showModelDetail(model.id);
                            grid.appendChild(tag);
                        });
                    });
                }
            }
            allModelsVisible = !allModelsVisible;
        }

        // 支持回车键提交
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                analyzeInput();
            }
        });
    </script>
</body>
